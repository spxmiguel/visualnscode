name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer without the v prefix (for example 0.2.0-beta.1)
        required: true
        type: string
      channel:
        description: Release channel
        required: true
        default: alpha
        type: choice
        options: [alpha, beta, stable]
      publish:
        description: Publish a GitHub release after building
        required: true
        default: false
        type: boolean
      confirmation:
        description: To publish, type publish vVERSION exactly
        required: false
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v7
      - id: release
        name: Validate release request
        shell: bash
        env:
          CHANNEL: ${{ inputs.channel }}
          CONFIRMATION: ${{ inputs.confirmation }}
          PUBLISH: ${{ inputs.publish }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          case "$CHANNEL" in
            stable) pattern='^[0-9]+\.[0-9]+\.[0-9]+$'; prerelease=false ;;
            alpha) pattern='^[0-9]+\.[0-9]+\.[0-9]+-alpha\.[0-9]+$'; prerelease=true ;;
            beta) pattern='^[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$'; prerelease=true ;;
          esac
          [[ "$VERSION" =~ $pattern ]] || { echo "Version does not match the $CHANNEL channel."; exit 1; }
          PACKAGE_VERSION=$(node -p "require('./apps/desktop/package.json').version")
          [[ "$PACKAGE_VERSION" == "$VERSION" ]] || { echo "package.json is $PACKAGE_VERSION, not $VERSION."; exit 1; }
          if [[ "$PUBLISH" == "true" && "$CONFIRMATION" != "publish v$VERSION" ]]; then
            echo "Publishing requires the exact confirmation: publish v$VERSION"
            exit 1
          fi
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Install Linux packaging tools
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes fakeroot rpm
      - name: Package desktop application
        run: pnpm --filter @visualnscode/desktop release:${{ matrix.platform }}
      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.pkg
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.msi
            release/*.exe
          if-no-files-found: error
          retention-days: 14

  publish:
    if: inputs.publish
    needs: [validate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true
      - name: Publish confirmed GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: VisualnsCode ${{ needs.validate.outputs.tag }}
          files: release/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ needs.validate.outputs.prerelease }}
          make_latest: ${{ inputs.channel == 'stable' }}
