name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write   # needed to create GitHub releases and upload assets

jobs:
  # ── Build on every supported platform ─────────────────────────
  build:
    name: Build — ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Linux needs additional system libraries for Electron
      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y rpm fakeroot dpkg

      - name: Build renderer & main
        run: pnpm --filter @visualnscode/desktop build

      - name: Package — ${{ matrix.platform }}
        run: pnpm --filter @visualnscode/desktop release:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            release/*.pkg
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.msi
            release/*.exe
          if-no-files-found: warn
          retention-days: 7

  # ── Create GitHub Release with all artifacts ──────────────────
  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: List release files
        run: ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VisualnsCode ${{ github.ref_name }}
          body: |
            ## Install

            **macOS / Linux — one line:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/spxmiguel/visualnscode/main/scripts/install.sh | bash
            ```

            **Windows — PowerShell:**
            ```powershell
            irm https://raw.githubusercontent.com/spxmiguel/visualnscode/main/scripts/install.ps1 | iex
            ```

            After install, run **`spxcode`** in any terminal to open the app.

            ---

            ### Downloads
            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `VisualnsCode-*-arm64.pkg` |
            | macOS (Intel) | `VisualnsCode-*-x64.pkg` |
            | Linux x64 | `VisualnsCode-*-x64.AppImage` |
            | Linux x64 (deb) | `VisualnsCode-*-amd64.deb` |
            | Windows x64 | `VisualnsCode-*-x64.msi` |

            See the full [CHANGELOG](https://github.com/spxmiguel/visualnscode/blob/main/CHANGELOG.md).
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
