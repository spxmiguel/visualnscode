name: Feature request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Describe the problem you want to solve and the solution you have in mind.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who is affected?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Editor
        - Chat / AI
        - Agents
        - Git
        - Preview
        - Templates
        - Onboarding
        - Deploy
        - Documentation
        - Other
