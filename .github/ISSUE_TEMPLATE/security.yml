name: Security issue (non-critical)
description: Report a hardening task that does not disclose an exploitable vulnerability
labels: [security]
body:
  - type: markdown
    attributes:
      value: |
        Do not disclose an exploitable vulnerability here. Credential exposure, data leaks, sandbox escapes, and remote code execution must use the private [security advisory form](https://github.com/spxmiguel/visualnscode/security/advisories/new).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the security concern.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Potential impact
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
