version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
    open-pull-requests-limit: 5
    groups:
      electron:
        patterns: ['electron', 'electron-builder']
      react:
        patterns: ['react', 'react-dom', '@types/react*']
      testing:
        patterns: ['vitest', '@vitest/*', 'playwright', '@playwright/*', '@testing-library/*']
      typescript:
        patterns: ['typescript', 'typescript-eslint', '@typescript-eslint/*']
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
      day: monday
